<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Данные для автокликера</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Автокликер</h1>
    <p class="subtitle">Введите данные для запуска автокликера</p>
    
    <form id="dataForm">
      <div class="form-group">
        <label for="tipoDocumento">Тип документа</label>
        <select id="tipoDocumento" required>
          <option value="NIE" selected>NIE</option>
          <option value="DNI">DNI</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="numeroNie">Номер NIE</label>
        <input type="text" id="numeroNie" placeholder="Z1868415S" required>
      </div>
      
      <div class="form-group">
        <label for="nombreCompleto">Имя и фамилия</label>
        <input type="text" id="nombreCompleto" placeholder="ANTONII REVSIN" required>
      </div>
      
      <div class="form-group">
        <label for="paisCiudadania">Страна гражданства</label>
        <input type="text" id="paisCiudadania" placeholder="UCRANIA" value="UCRANIA" required>
      </div>
      
      <button type="submit" class="btn">🚀 Запустить автокликер</button>
    </form>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById('dataForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        tipoDocumento: document.getElementById('tipoDocumento').value,
        numeroNie: document.getElementById('numeroNie').value.trim(),
        nombreCompleto: document.getElementById('nombreCompleto').value.trim(),
        paisCiudadania: document.getElementById('paisCiudadania').value.trim() || 'UCRANIA'
      };

      if (!data.numeroNie || !data.nombreCompleto) {
        showStatus('❌ Заполните все обязательные поля!', 'error');
        return;
      }

      showStatus('✅ Данные отправлены! Запускаю автокликер...', 'success');
      
      window.userData = data;
      document.body.style.background = '#d4edda';
      
      setTimeout(() => {
        window.close();
      }, 1000);
    });

    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }
  </script>
</body>
</html>
